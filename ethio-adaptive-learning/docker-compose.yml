version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: eal_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user1234
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/data"
    volumes:
      - ./chroma-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ethio-adaptive-learning-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - chromadb
    restart: unless-stopped

volumes:
  db_data: